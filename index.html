<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Boggle Français</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg:#0d0d0f; --surface:#16161a; --surface2:#1e1e24;
    --border:#2a2a35; --gold:#c8a96e; --gold-light:#e8c98e;
    --cream:#f0e8d8; --red:#e05252; --green:#52c97a;
    --text:#d8d0c8; --text-dim:#6a6478;
    --tile-bg:#1a1a22; --tile-active:#2a2438; --tile-border:#30304a;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;
    min-height:100vh;display:flex;flex-direction:column;
    align-items:center;padding:16px;overflow-x:hidden;user-select:none;
  }
  body::before{
    content:'';position:fixed;inset:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events:none;z-index:1000;opacity:0.4;
  }

  /* ── LOADING ── */
  #loadingScreen{
    position:fixed;inset:0;background:var(--bg);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    z-index:900;gap:20px;padding:32px;
  }
  #loadingScreen h2{
    font-family:'Playfair Display',serif;font-size:2.2rem;
    color:var(--gold);letter-spacing:0.1em;
  }
  #loadingMsg{
    font-size:0.68rem;letter-spacing:0.2em;color:var(--text-dim);
    text-transform:uppercase;text-align:center;line-height:1.9;
  }
  .bar-wrap{width:min(90vw,320px);height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;}
  #progressBar{height:100%;width:0%;background:var(--gold);border-radius:2px;transition:width 0.25s ease;}
  #errorMsg{
    font-size:0.72rem;color:var(--red);text-align:center;
    max-width:340px;line-height:1.9;display:none;
    border:1px solid rgba(224,82,82,0.3);border-radius:10px;padding:16px 20px;
  }

  /* ── HEADER ── */
  header{text-align:center;margin-bottom:16px;width:100%;}
  h1{
    font-family:'Playfair Display',serif;font-size:clamp(2rem,8vw,3rem);
    font-weight:900;color:var(--gold);letter-spacing:0.08em;text-transform:uppercase;line-height:1;
  }
  .subtitle{font-size:0.65rem;letter-spacing:0.3em;color:var(--text-dim);text-transform:uppercase;margin-top:4px;}
  .dict-info{font-size:0.58rem;color:var(--text-dim);letter-spacing:0.1em;margin-top:2px;}

  /* ── STATS ── */
  .top-bar{display:flex;gap:12px;width:100%;max-width:420px;margin-bottom:12px;}
  .stat-box{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px;text-align:center;}
  .stat-label{font-size:0.55rem;letter-spacing:0.25em;color:var(--text-dim);text-transform:uppercase;display:block;margin-bottom:2px;}
  .stat-value{font-size:1.6rem;font-weight:500;color:var(--gold);font-family:'Playfair Display',serif;line-height:1;}
  .timer-bar{width:100%;max-width:420px;height:4px;background:var(--surface2);border-radius:2px;margin-bottom:12px;overflow:hidden;}
  .timer-fill{height:100%;background:var(--gold);border-radius:2px;transition:width 1s linear,background 0.3s;}
  .timer-fill.urgent{background:var(--red);}

  /* ── WORD DISPLAY ── */
  .current-word{height:42px;display:flex;align-items:center;justify-content:center;gap:4px;margin-bottom:10px;min-width:200px;}
  .word-letter{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:var(--gold-light);animation:letterPop .12s ease-out;}
  @keyframes letterPop{0%{transform:scale(.6) translateY(4px);opacity:0}100%{transform:scale(1) translateY(0);opacity:1}}
  .word-status{font-size:.7rem;letter-spacing:.2em;height:18px;text-align:center;margin-bottom:8px;}
  .word-status.valid{color:var(--green);}
  .word-status.invalid{color:var(--red);}
  .word-status.short{color:var(--text-dim);}

  /* ── GRID ── */
  .grid-container{position:relative;touch-action:none;margin-bottom:14px;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:min(92vw,380px);}
  .tile{
    aspect-ratio:1;background:var(--tile-bg);border:1.5px solid var(--tile-border);
    border-radius:12px;display:flex;align-items:center;justify-content:center;
    font-family:'Playfair Display',serif;font-size:clamp(1.3rem,5vw,1.9rem);
    font-weight:700;color:var(--cream);cursor:pointer;position:relative;
    transition:background .12s,border-color .12s,transform .1s,box-shadow .12s;overflow:hidden;
  }
  .tile::after{
    content:'';position:absolute;inset:0;
    background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.06),transparent 70%);
    border-radius:inherit;pointer-events:none;
  }
  .tile .pts{position:absolute;bottom:3px;right:5px;font-family:'DM Mono',monospace;font-size:.48rem;color:var(--text-dim);}
  .tile.selected{
    background:var(--tile-active);border-color:var(--gold);
    box-shadow:0 0 0 1px var(--gold),0 4px 16px rgba(200,169,110,.25);
    color:var(--gold-light);transform:scale(1.06);z-index:2;
  }
  .tile.path{background:#201c30;border-color:#5a4a80;color:#b09ad8;}
  .tile.hidden-letter { color: transparent !important; }
  @keyframes tileReveal {
    0%   { transform: rotateY(90deg) scale(0.8); opacity: 0; }
    60%  { transform: rotateY(-8deg) scale(1.05); }
    100% { transform: rotateY(0deg) scale(1); opacity: 1; }
  }
  .tile.reveal { animation: tileReveal 0.35s ease-out forwards; }
    0%{transform:scale(1.06)}
    50%{transform:scale(1.12);background:#2a4020;border-color:var(--green)}
    100%{transform:scale(1)}
  }
  .path-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;}
  .path-svg path{fill:none;stroke:var(--gold);stroke-width:3;stroke-linecap:round;stroke-linejoin:round;opacity:.5;filter:drop-shadow(0 0 4px rgba(200,169,110,.6));}

  /* ── WORDS FOUND ── */
  .words-section{width:100%;max-width:420px;}
  .words-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .words-label{font-size:.6rem;letter-spacing:.25em;color:var(--text-dim);text-transform:uppercase;}
  .words-count{font-size:.6rem;color:var(--text-dim);}
  .words-list{display:flex;flex-wrap:wrap;gap:6px;max-height:100px;overflow-y:auto;}
  .word-chip{
    background:var(--surface);border:1px solid var(--border);
    border-radius:6px;padding:3px 8px;font-size:.75rem;color:var(--gold);
    letter-spacing:.05em;animation:chipIn .2s ease-out;
  }
  @keyframes chipIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}

  /* ── CONTROLS ── */
  .controls{display:flex;gap:10px;margin-top:14px;width:100%;max-width:420px;}
  .btn{
    flex:1;padding:12px;border:1.5px solid var(--border);border-radius:10px;
    background:var(--surface);color:var(--text);font-family:'DM Mono',monospace;
    font-size:.75rem;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:all .15s;
  }
  .btn:hover{border-color:var(--gold);color:var(--gold);}
  .btn.primary{background:var(--gold);color:#0d0d0f;border-color:var(--gold);font-weight:500;}
  .btn.primary:hover{background:var(--gold-light);}
  .btn:disabled{opacity:.4;cursor:not-allowed;}

  /* ── SCORE POPUP ── */
  .score-popup{
    position:fixed;pointer-events:none;font-family:'Playfair Display',serif;
    font-size:1.5rem;font-weight:700;color:var(--gold);z-index:500;
    animation:floatUp 1s ease-out forwards;
  }
  @keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.3)}}

  /* ── GAME OVER ── */
  .overlay{
    position:fixed;inset:0;background:rgba(13,13,15,.92);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    z-index:200;backdrop-filter:blur(8px);animation:fadeIn .3s ease;
  }
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .overlay h2{font-family:'Playfair Display',serif;font-size:2.5rem;color:var(--gold);margin-bottom:8px;}
  .overlay .final-score{font-size:4rem;font-family:'Playfair Display',serif;color:var(--gold-light);line-height:1;margin-bottom:8px;}
  .overlay .final-sub{font-size:.7rem;letter-spacing:.25em;color:var(--text-dim);text-transform:uppercase;margin-bottom:24px;}
  .overlay .found-words{max-height:160px;overflow-y:auto;display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:320px;margin-bottom:28px;}

  .notif{
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    background:var(--surface);border:1.5px solid var(--border);
    border-radius:10px;padding:10px 22px;font-size:.8rem;color:var(--text-dim);
    letter-spacing:.1em;z-index:300;animation:notifAnim 1.5s ease-out forwards;
  }
  @keyframes notifAnim{
    0%{opacity:0;transform:translate(-50%,-50%) scale(.9)}
    20%{opacity:1;transform:translate(-50%,-50%) scale(1)}
    80%{opacity:1}
    100%{opacity:0;transform:translate(-50%,-60%) scale(.95)}
  }
</style>
</head>
<body>

<!-- LOADING -->
<div id="loadingScreen">
  <h2>Boggle</h2>
  <div id="loadingMsg">Chargement du dictionnaire…</div>
  <div class="bar-wrap"><div id="progressBar"></div></div>
  <div id="errorMsg"></div>
</div>

<!-- GAME -->
<div id="gameUI" style="display:none;flex-direction:column;align-items:center;width:100%">
  <header>
    <h1>Boggle</h1>
    <div class="subtitle">Dictionnaire Lexique383</div>
    <div class="dict-info" id="dictInfo"></div>
  </header>

  <div class="top-bar">
    <div class="stat-box"><span class="stat-label">Score</span><span class="stat-value" id="score">0</span></div>
    <div class="stat-box"><span class="stat-label">Temps</span><span class="stat-value" id="timer">3:00</span></div>
    <div class="stat-box"><span class="stat-label">Mots</span><span class="stat-value" id="wordCount">0</span></div>
  </div>

  <div class="timer-bar"><div class="timer-fill" id="timerFill"></div></div>

  <div class="current-word" id="currentWord"></div>
  <div class="word-status" id="wordStatus"></div>

  <div class="grid-container" id="gridContainer">
    <svg class="path-svg" id="pathSvg"></svg>
    <div class="grid" id="grid"></div>
  </div>

  <div class="words-section">
    <div class="words-header">
      <span class="words-label">Mots trouvés</span>
      <span class="words-count" id="wordsCountLabel">0 mot</span>
    </div>
    <div class="words-list" id="wordsList"></div>
  </div>

  <div class="controls">
    <button class="btn" onclick="newGame()">Nouveau</button>
    <button class="btn primary" id="startBtn" onclick="startGame()">Démarrer</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// DICTIONARY  —  même origine GitHub Pages, zéro CORS
// ═══════════════════════════════════════════════════════════════
const TSV_URL = 'Lexique383.tsv'; // chemin relatif → même dépôt
const dictionary = new Set();

async function loadDictionary() {
  setMsg('Chargement du dictionnaire…');
  setBar(5);

  let text;
  try {
    const resp = await fetch(TSV_URL);
    if (!resp.ok) throw new Error(`HTTP ${resp.status} — fichier introuvable.\nVérifiez que Lexique383.tsv est bien à la racine du dépôt.`);

    // Lecture en streaming avec progression
    const reader = resp.body.getReader();
    const chunks = [];
    let received = 0;
    const ESTIMATE = 28 * 1024 * 1024; // ~28 Mo
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
      received += value.length;
      setBar(5 + Math.min(55, (received / ESTIMATE * 55) | 0));
    }

    // Assemblage et décodage UTF-8
    const merged = new Uint8Array(received);
    let offset = 0;
    for (const c of chunks) { merged.set(c, offset); offset += c.length; }
    text = new TextDecoder('utf-8').decode(merged);

  } catch (err) {
    showError(err.message);
    return;
  }

  setMsg('Extraction des mots…');
  setBar(62);

  // Parsing TSV
  // Ligne 0 = en-tête, colonne "ortho" = index 0 dans Lexique383
  const lines = text.split('\n');

  // Détection robuste de la colonne ortho
  let orthoCol = 0;
  if (lines[0]) {
    const idx = lines[0].split('\t').findIndex(h => h.trim() === 'ortho');
    if (idx >= 0) orthoCol = idx;
  }

  // Normalisation : NFD décompose les accents, puis on retire les diacritiques.
  // "naît" → "NAIT", "œuf" → "OEF"… Le joueur forme des mots sans accents
  // (les dés n'en ont pas), donc le lookup doit être sur la forme sans accent.
  const normalize = s => s.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toUpperCase();

  // Regex sur la forme brute (avant normalisation)
  const reAlpha = /^[a-zA-ZÀ-ÖØ-öø-ÿœæŒÆ]+$/;

  let n = 0;
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i];
    if (!line) continue;

    let word;
    if (orthoCol === 0) {
      const tab = line.indexOf('\t');
      word = tab === -1 ? line : line.slice(0, tab);
    } else {
      word = line.split('\t')[orthoCol];
    }

    if (!word) continue;
    const len = word.length;
    if (len >= 3 && len <= 16 && reAlpha.test(word)) {
      dictionary.add(normalize(word));
    }

    n++;
    if (n % 50000 === 0) {
      setBar(62 + Math.min(33, (n / lines.length * 33) | 0));
      await new Promise(r => setTimeout(r, 0)); // yield UI
    }
  }

  setBar(100);
  const count = dictionary.size.toLocaleString('fr-FR');
  setMsg(`${count} formes chargées ✓`);
  document.getElementById('dictInfo').textContent = `Lexique383 · ${count} formes · 3–16 lettres`;

  await new Promise(r => setTimeout(r, 600));
  document.getElementById('loadingScreen').style.display = 'none';
  const ui = document.getElementById('gameUI');
  ui.style.display = 'flex';
  newGame();
}

function setMsg(t) { document.getElementById('loadingMsg').textContent = t; }
function setBar(p) { document.getElementById('progressBar').style.width = p + '%'; }
function showError(msg) {
  document.getElementById('loadingMsg').style.display = 'none';
  const el = document.getElementById('errorMsg');
  el.style.display = 'block';
  el.innerHTML = msg.replace(/\n/g, '<br>');
}

// ═══════════════════════════════════════════════════════════════
// CONSTANTES
// ═══════════════════════════════════════════════════════════════
const GAME_DURATION = 180;
const N = 4;

const FRENCH_DICE = [
  'ETLRNI','AISDOE','RSTLNE','ASDNIE','EAINSR','TOULED','PRMAIC',
  'UNOTLE','BSGNAE','QUAFFI','EIVUHR','OUJDXI','KWVZGB','YXZWKJ',
  'HMCPSD','ENSITR'
];
const LETTER_PTS = {Q:10,W:10,X:10,Y:10,Z:10,K:8,J:8,B:4,V:4,H:4,F:4,D:3,G:3,M:3,P:3,C:3};
const lpts = l => LETTER_PTS[l] || 1;

// ═══════════════════════════════════════════════════════════════
// ÉTAT
// ═══════════════════════════════════════════════════════════════
let board=[], selectedPath=[], foundWords=new Set();
let score=0, timeLeft=GAME_DURATION, gameActive=false;
let timerInterval=null, isDragging=false, gestureStart=null;

// ═══════════════════════════════════════════════════════════════
// UTILITAIRES
// ═══════════════════════════════════════════════════════════════
const calcScore  = w => Math.max(1, w.length - 2);
const normalize  = s => s.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toUpperCase();
const isValidWord= w => w.length >= 3 && dictionary.has(normalize(w));
const isAdjacent = (a,b) => {
  const dr = Math.abs((a/N|0)-(b/N|0)), dc = Math.abs(a%N - b%N);
  return dr<=1 && dc<=1 && a!==b;
};
const isDiag = (a,b) =>
  Math.abs((a/N|0)-(b/N|0))===1 && Math.abs(a%N-b%N)===1;

// ═══════════════════════════════════════════════════════════════
// GÉNÉRATION PLATEAU
// ═══════════════════════════════════════════════════════════════
function generateBoard() {
  const dice = [...FRENCH_DICE];
  for (let i=dice.length-1;i>0;i--) {
    const j=Math.random()*(i+1)|0;
    [dice[i],dice[j]]=[dice[j],dice[i]];
  }
  return dice.map(d => d[Math.random()*d.length|0]);
}

// ═══════════════════════════════════════════════════════════════
// RENDU
// ═══════════════════════════════════════════════════════════════
function renderBoard(hidden = false) {
  const g = document.getElementById('grid');
  g.innerHTML = '';
  board.forEach((l,i) => {
    const t = document.createElement('div');
    t.className = 'tile' + (hidden ? ' hidden-letter' : '');
    t.dataset.index = i;
    t.innerHTML = `${l}<span class="pts">${lpts(l)}</span>`;
    g.appendChild(t);
  });
}

function updateTileStates() {
  document.querySelectorAll('.tile').forEach(t => {
    const i = +t.dataset.index;
    const isLast = selectedPath.length>0 && selectedPath[selectedPath.length-1]===i;
    t.classList.toggle('selected', isLast);
    t.classList.toggle('path', selectedPath.includes(i) && !isLast);
  });
  drawPath();
}

function getTileCenter(i) {
  const wrap = document.getElementById('gridContainer').getBoundingClientRect();
  const tile = document.querySelector(`.tile[data-index="${i}"]`).getBoundingClientRect();
  return { x: tile.left-wrap.left+tile.width/2, y: tile.top-wrap.top+tile.height/2 };
}

function drawPath() {
  const svg = document.getElementById('pathSvg');
  if (selectedPath.length < 2) { svg.innerHTML=''; return; }
  const wrap = document.getElementById('gridContainer');
  svg.setAttribute('viewBox', `0 0 ${wrap.offsetWidth} ${wrap.offsetHeight}`);
  const d = selectedPath.map((i,k) => {
    const p = getTileCenter(i);
    return `${k?'L':'M'}${p.x.toFixed(1)},${p.y.toFixed(1)}`;
  }).join(' ');
  svg.innerHTML = `<path d="${d}"/>`;
}

function updateWordDisplay() {
  const word = selectedPath.map(i=>board[i]).join('');
  document.getElementById('currentWord').innerHTML =
    word.split('').map(l=>`<span class="word-letter">${l}</span>`).join('');
  const st = document.getElementById('wordStatus');
  if (word.length < 3) {
    st.textContent = word.length ? `${word.length} lettre${word.length>1?'s':''}` : '';
    st.className = 'word-status short';
  } else if (foundWords.has(word)) {
    st.textContent = 'Déjà trouvé'; st.className = 'word-status invalid';
  } else if (isValidWord(word)) {
    const p = calcScore(word);
    st.textContent = `✓ +${p} pt${p>1?'s':''}`; st.className = 'word-status valid';
  } else {
    st.textContent = 'Absent du dictionnaire'; st.className = 'word-status invalid';
  }
}

// ═══════════════════════════════════════════════════════════════
// GESTES — détection diagonale stricte
// ═══════════════════════════════════════════════════════════════
function getTileAtPoint(cx, cy) {
  const wrap = document.getElementById('gridContainer').getBoundingClientRect();
  const rx = cx-wrap.left, ry = cy-wrap.top;
  let best=null, bestD=Infinity;
  document.querySelectorAll('.tile').forEach(t => {
    const r = t.getBoundingClientRect();
    const tcx = r.left-wrap.left+r.width/2, tcy = r.top-wrap.top+r.height/2;
    const d = Math.hypot(rx-tcx, ry-tcy);
    if (d < r.width*0.46 && d < bestD) { bestD=d; best=+t.dataset.index; }
  });
  return best;
}

// Pour une case diagonale, l'angle du geste doit être compris
// entre 22° et 68° (clairement diagonal, ni trop H ni trop V).
function diagonalOk(sx, sy, ex, ey) {
  const dx=ex-sx, dy=ey-sy;
  if (Math.hypot(dx,dy) < 8) return false;
  let a = Math.abs(Math.atan2(dy,dx) * 180/Math.PI); // 0–180
  if (a > 90) a = 180-a;                              // repli 0–90
  return a >= 22 && a <= 68;
}

function onStart(x, y) {
  if (!gameActive) return;
  isDragging=true; selectedPath=[]; gestureStart=null;
  const t = getTileAtPoint(x, y);
  if (t !== null) { selectedPath=[t]; gestureStart={x,y}; }
  updateTileStates(); updateWordDisplay();
}

function onMove(x, y) {
  if (!isDragging || !gameActive) return;
  const t = getTileAtPoint(x, y);
  if (t === null) return;
  const last = selectedPath[selectedPath.length-1];

  // Retour arrière
  if (selectedPath.length>=2 && t===selectedPath[selectedPath.length-2]) {
    selectedPath.pop(); gestureStart={x,y};
    updateTileStates(); updateWordDisplay(); return;
  }
  if (t===last || selectedPath.includes(t)) return;
  if (!isAdjacent(last, t)) return;

  // Validation diagonale
  if (isDiag(last,t) && !(gestureStart && diagonalOk(gestureStart.x,gestureStart.y,x,y))) return;

  selectedPath.push(t); gestureStart={x,y};
  updateTileStates(); updateWordDisplay();
}

function onEnd() {
  if (!isDragging) return;
  isDragging = false;
  const word = selectedPath.map(i=>board[i]).join('');

  if (word.length>=3 && isValidWord(word) && !foundWords.has(word)) {
    const pts = calcScore(word);
    score += pts; foundWords.add(word);
    document.getElementById('score').textContent = score;
    document.getElementById('wordCount').textContent = foundWords.size;
    document.getElementById('wordsCountLabel').textContent =
      `${foundWords.size} mot${foundWords.size>1?'s':''}`;

    selectedPath.forEach(i => {
      const t = document.querySelector(`.tile[data-index="${i}"]`);
      if (t) { t.style.animation='none'; void t.offsetWidth; t.style.animation='tileUsed .4s ease-out'; }
    });

    const chip = document.createElement('div');
    chip.className='word-chip';
    chip.textContent=`${word} (+${pts})`;
    document.getElementById('wordsList').prepend(chip);

    // Popup score
    const center = getTileCenter(selectedPath[selectedPath.length-1]);
    const wrap   = document.getElementById('gridContainer').getBoundingClientRect();
    const pop    = document.createElement('div');
    pop.className='score-popup'; pop.textContent=`+${pts}`;
    pop.style.left=`${wrap.left+center.x}px`; pop.style.top=`${wrap.top+center.y-20}px`;
    document.body.appendChild(pop); setTimeout(()=>pop.remove(), 1000);

  } else if (word.length>=3 && foundWords.has(word)) {
    showNotif('Déjà trouvé !');
  }

  setTimeout(() => {
    selectedPath=[];
    document.getElementById('pathSvg').innerHTML='';
    document.getElementById('currentWord').innerHTML='';
    document.getElementById('wordStatus').textContent='';
    updateTileStates();
  }, 250);
}

function showNotif(msg) {
  document.querySelectorAll('.notif').forEach(n=>n.remove());
  const n = document.createElement('div');
  n.className='notif'; n.textContent=msg;
  document.body.appendChild(n); setTimeout(()=>n.remove(), 1500);
}

// ═══════════════════════════════════════════════════════════════
// ÉVÉNEMENTS
// ═══════════════════════════════════════════════════════════════
function attachEvents() {
  const c = document.getElementById('gridContainer');
  c.addEventListener('touchstart', e=>{e.preventDefault();const t=e.touches[0];onStart(t.clientX,t.clientY);},{passive:false});
  c.addEventListener('touchmove',  e=>{e.preventDefault();const t=e.touches[0];onMove(t.clientX,t.clientY); },{passive:false});
  c.addEventListener('touchend',   e=>{e.preventDefault();onEnd();},{passive:false});
  c.addEventListener('mousedown',  e=>onStart(e.clientX,e.clientY));
  window.addEventListener('mousemove', e=>{if(isDragging) onMove(e.clientX,e.clientY);});
  window.addEventListener('mouseup',   ()=>{if(isDragging) onEnd();});
}

// ═══════════════════════════════════════════════════════════════
// CONTRÔLE DU JEU
// ═══════════════════════════════════════════════════════════════
function newGame() {
  clearInterval(timerInterval); gameActive=false;
  board=generateBoard(); selectedPath=[]; foundWords=new Set(); score=0; timeLeft=GAME_DURATION;
  renderBoard(true); // lettres cachées jusqu'au démarrage
  updateTileStates();
  ['score','wordCount'].forEach(id=>document.getElementById(id).textContent='0');
  document.getElementById('timer').textContent='3:00';
  document.getElementById('wordsCountLabel').textContent='0 mot';
  document.getElementById('wordsList').innerHTML='';
  document.getElementById('currentWord').innerHTML='';
  document.getElementById('wordStatus').textContent='';
  document.getElementById('pathSvg').innerHTML='';
  document.getElementById('timerFill').style.width='100%';
  document.getElementById('timerFill').classList.remove('urgent');
  document.querySelector('.overlay')?.remove();
  document.getElementById('startBtn').disabled=false;
}

function startGame() {
  if (gameActive) return;

  // Nouveau mélange au démarrage + révélation animée des tuiles
  board = generateBoard();
  renderBoard(true);
  const tiles = document.querySelectorAll('.tile');
  tiles.forEach((t, i) => {
    setTimeout(() => {
      t.classList.remove('hidden-letter');
      t.classList.add('reveal');
    }, i * 40); // décalage en cascade
  });

  gameActive=true; document.getElementById('startBtn').disabled=true;
  timerInterval = setInterval(()=>{
    timeLeft--;
    const m=timeLeft/60|0, s=timeLeft%60;
    document.getElementById('timer').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    document.getElementById('timerFill').style.width=`${(timeLeft/GAME_DURATION)*100}%`;
    if (timeLeft<=30) document.getElementById('timerFill').classList.add('urgent');
    if (timeLeft<=0)  { clearInterval(timerInterval); gameActive=false; showGameOver(); }
  }, 1000);
}

function showGameOver() {
  const words = [...foundWords].sort((a,b)=>b.length-a.length);
  const ov = document.createElement('div');
  ov.className = 'overlay';
  ov.innerHTML = `
    <h2>Fin de partie</h2>
    <div class="final-score">${score}</div>
    <div class="final-sub">point${score!==1?'s':''} — ${foundWords.size} mot${foundWords.size!==1?'s':''}</div>
    <div class="found-words">${words.map(w=>`<div class="word-chip">${w} (+${calcScore(w)})</div>`).join('')}</div>
    <button class="btn primary" onclick="newGame()" style="padding:13px 40px;font-size:.8rem;flex:none;width:auto">Rejouer</button>`;
  document.body.appendChild(ov);
}

// ═══════════════════════════════════════════════════════════════
// DÉMARRAGE
// ═══════════════════════════════════════════════════════════════
attachEvents();
loadDictionary();
</script>
